services:
  web:
    build: .
    container_name: ocr_web_prod
    restart: unless-stopped
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      FLASK_DEBUG: 0
      DB_ENGINE: postgres
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      SECURITY_HEADERS_ENABLED: ${SECURITY_HEADERS_ENABLED:-1}
      PLUGIN_SECURITY_ENABLED: ${PLUGIN_SECURITY_ENABLED:-1}
      PLUGIN_TOKEN_TTL_SECONDS: ${PLUGIN_TOKEN_TTL_SECONDS:-120}
      PLUGIN_CLIENTS: ${PLUGIN_CLIENTS:-}
      PLUGIN_ALLOWED_ORIGINS: ${PLUGIN_ALLOWED_ORIGINS:-}
      ADMIN_PANEL_API_KEY: ${ADMIN_PANEL_API_KEY:-}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      RATE_LIMIT_TOKEN_PER_WINDOW: ${RATE_LIMIT_TOKEN_PER_WINDOW:-20}
      RATE_LIMIT_REGISTER_PER_WINDOW: ${RATE_LIMIT_REGISTER_PER_WINDOW:-90}
      RATE_LIMIT_AUTH_PER_WINDOW: ${RATE_LIMIT_AUTH_PER_WINDOW:-180}
      DUPLICATE_FACE_THRESHOLD: ${DUPLICATE_FACE_THRESHOLD:-0.92}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-4194304}
    ports:
      - "5000:5000"