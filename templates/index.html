<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro y Login Facial</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <main class="layout">
    <section class="panel camera-panel">
      <p class="eyebrow">Face Access Platform</p>
      <h1>Registro y Autenticacion Biométrica</h1>
      <p class="subtitle">Verificación de identidad en tiempo real mediante streaming seguro.</p>

      <div class="video-shell">
        <video id="camera" autoplay playsinline muted></video>
        <div id="streamStatus" class="pill">Inicializando cámara...</div>
      </div>
    </section>

    <section class="panel form-panel">
      <div class="tabs">
        <button id="tabRegister" class="tab active" type="button">Registro</button>
        <button id="tabAuth" class="tab" type="button">Autenticación</button>
      </div>

      <form id="registerForm" class="card">
        <h2>Alta de usuario</h2>
        <label for="nombre">Nombre</label>
        <input id="nombre" name="nombre" placeholder="Nombre completo" required>

        <label for="documento">Identificación</label>
        <input id="documento" name="documento" placeholder="DNI, cédula o ID corporativo" required>

        <button id="btnStartRegister" type="submit" class="primary">Iniciar registro por streaming</button>
      </form>

      <div id="authCard" class="card hidden">
        <h2>Acceso corporativo</h2>
        <p>Validación facial continua hasta confirmar coincidencia.</p>
        <button id="btnStartAuth" type="button" class="primary">Iniciar autenticacion</button>
      </div>

      <div id="result" class="result"></div>
    </section>
  </main>

  <canvas id="buffer" class="hidden"></canvas>
  <script>
    window.__FACE_PLUGIN__ = {
      pluginMode: {{ 'true' if plugin_context and plugin_context.get('plugin_mode') else 'false' }},
      openerOrigin: "{{ plugin_context.get('opener_origin', '*') if plugin_context else '*' }}"
    };
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
