services:
  db:
    image: postgres:16
    container_name: ocr_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ocr}
      POSTGRES_USER: ${DB_USER:-ocr_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ocr_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ocr_user} -d ${DB_NAME:-ocr}"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build: .
    container_name: ocr_web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 5000
      FLASK_DEBUG: 1
      DB_ENGINE: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ocr}
      DB_USER: ${DB_USER:-ocr_user}
      DB_PASSWORD: ${DB_PASSWORD:-ocr_password}
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-ocr_user}:${DB_PASSWORD:-ocr_password}@db:5432/${DB_NAME:-ocr}
    ports:
      - "5000:5000"
    volumes:
      - .:/app

volumes:
  postgres_data:
